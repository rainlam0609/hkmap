<!DOCTYPE html>
<html>
<head>
    <title>Zero Account Map (Hong Kong)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // No tokens required! [Lat, Lng] instead of Mapbox's [Lng, Lat]
        const map = L.map('map').setView([22.3193, 114.1694], 11);

        // Load free map tiles from OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Add a marker
        L.marker([22.3193, 114.1694]).addTo(map)
            .bindPopup('Hello Hong Kong! (No Account Needed)')
            .openPopup();
    </script>
</body>
</html>
